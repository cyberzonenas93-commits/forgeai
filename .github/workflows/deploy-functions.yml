# Deploy Firebase Cloud Functions when code is pushed.
# Used by "Deploy via Git" in the app: commit and push, then this workflow deploys.
#
# Setup:
# 1. Create a Firebase CI token: firebase login:ci
# 2. In this repo: Settings → Secrets and variables → Actions → New repository secret
#    Name: FIREBASE_TOKEN   Value: <the token>
# 3. Push to main (or the branch below) to deploy.
name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
